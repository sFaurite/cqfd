# Build du site Astro (avec l'index de recherche Pagefind) et déploiement sur
# GitHub Pages. Le site est servi sous le sous-chemin défini par `base` dans
# astro.config.mjs (ex. https://sfaurite.github.io/cqfd/).
#
# Prérequis côté dépôt (une seule fois) : Settings → Pages → Build and deployment
# → Source : « GitHub Actions ».
name: Déploiement GitHub Pages

on:
  push:
    branches: [main]
  workflow_dispatch: {}

# Permissions requises pour publier sur Pages via l'artefact officiel.
permissions:
  contents: read
  pages: write
  id-token: write

# Un seul déploiement à la fois ; on n'annule pas un déploiement en cours.
concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v7

      - name: Setup Node
        uses: actions/setup-node@v6
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Build (Astro + Pagefind)
        run: npm run build

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v5
        with:
          path: ./dist

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v5
